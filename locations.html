<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Locations | Modern Care Hospital</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>
  
  <nav class="navbar scrolled">
    <div class="container navbar-container">
      <a href="index.html" class="logo">ModernCare</a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
      </div>
      <div class="nav-actions">
        <button class="theme-toggle btn-outline btn" style="border:none; padding: 0.5rem">🌓</button>
      </div>
    </div>
  </nav>

  <main style="padding-top: 8rem; padding-bottom: 4rem;">
    <div class="container reveal">
      <h1 style="text-align: center; margin-bottom: 3rem;">Our Locations</h1>
      
      <div class="grid grid-cols-2">
        <div class="card" style="border: 2px solid var(--color-primary);">
          <h3 style="margin-bottom: 1rem; color: var(--color-primary);">Main Campus (Downtown)</h3>
          <p>123 Health Avenue, Medical District, NY 10001</p>
          <p class="fw-600">Hours: 24/7 (Emergency & Inpatient)</p>
          <p>Phone: 1-800-123-4567</p>
          <button class="btn btn-outline" style="margin-top: 1.5rem;">Get Directions</button>
        </div>
        
        <div class="card">
          <h3 style="margin-bottom: 1rem;">Northside Clinic (Outpatient)</h3>
          <p>456 Wellness Blvd, Northside, NY 10002</p>
          <p class="fw-600">Hours: Mon-Fri, 8am - 6pm</p>
          <p>Phone: 1-800-123-4568</p>
          <button class="btn btn-outline" style="margin-top: 1.5rem;">Get Directions</button>
        </div>
      </div>
    </div>
  </main>
  
  <script src="js/script.js"></script>
</body>
</html>
